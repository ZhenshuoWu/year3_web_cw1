databases:
  - name: f1-insight-db
    plan: free
    databaseName: f1_insight
    ipAllowList: []

services:
  - type: web
    name: f1-insight-api
    runtime: python
    plan: free
    buildCommand: cd f1-insight-api && pip install -r requirements.txt
    startCommand: cd f1-insight-api && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: f1-insight-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.2"
